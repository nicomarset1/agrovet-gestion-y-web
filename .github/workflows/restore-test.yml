name: Restore backup test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  restore-test:
    name: Restore latest backup into test database
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      GDRIVE_RCLONE_CONFIG: ${{ secrets.GDRIVE_RCLONE_CONFIG }}
      RESTORE_TEST_DATABASE_URL: ${{ secrets.RESTORE_TEST_DATABASE_URL }}

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$GDRIVE_RCLONE_CONFIG" || (echo "GDRIVE_RCLONE_CONFIG secret is missing" && exit 1)
          test -n "$GDRIVE_FOLDER_ID" || (echo "GDRIVE_FOLDER_ID secret is missing" && exit 1)
          test -n "$RESTORE_TEST_DATABASE_URL" || (echo "RESTORE_TEST_DATABASE_URL secret is missing" && exit 1)

      - name: Install rclone
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure Google Drive access
        shell: bash
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '%s' "$GDRIVE_RCLONE_CONFIG" > "$HOME/.config/rclone/rclone.conf"
          if grep -q '^root_folder_id[[:space:]]*=' "$HOME/.config/rclone/rclone.conf"; then
            sed -i "s|^root_folder_id[[:space:]]*=.*|root_folder_id = $GDRIVE_FOLDER_ID|" "$HOME/.config/rclone/rclone.conf"
          else
            printf '\nroot_folder_id = %s\n' "$GDRIVE_FOLDER_ID" >> "$HOME/.config/rclone/rclone.conf"
          fi
          chmod 600 "$HOME/.config/rclone/rclone.conf"

      - name: Download latest backup
        shell: bash
        run: |
          latest_backup="$(rclone lsf gdrive: --include 'agrovet-postgres-*.dump' | sort | tail -n 1)"
          test -n "$latest_backup" || (echo "No backup files found in Google Drive" && exit 1)
          echo "Using backup: $latest_backup"
          rclone copyto "gdrive:$latest_backup" "$RUNNER_TEMP/$latest_backup"
          echo "BACKUP_FILE=$latest_backup" >> "$GITHUB_ENV"
          echo "BACKUP_PATH=$RUNNER_TEMP/$latest_backup" >> "$GITHUB_ENV"

      - name: Restore backup into test database
        shell: bash
        run: |
          docker run --rm \
            -e BACKUP_FILE \
            -v "$RUNNER_TEMP:/backup" \
            postgres:17-alpine \
            sh -c 'pg_restore --list "/backup/$BACKUP_FILE" | head -n 40'
          docker run --rm \
            -e RESTORE_TEST_DATABASE_URL \
            -e BACKUP_FILE \
            -v "$RUNNER_TEMP:/backup" \
            postgres:17-alpine \
            sh -c 'pg_restore --clean --if-exists --no-owner --no-acl --dbname="$RESTORE_TEST_DATABASE_URL" "/backup/$BACKUP_FILE"'

      - name: Verify restored data
        shell: bash
        run: |
          docker run --rm \
            -e RESTORE_TEST_DATABASE_URL \
            postgres:17-alpine \
            sh -c 'psql "$RESTORE_TEST_DATABASE_URL" -v ON_ERROR_STOP=1 -c "\dt *.*" -c "
              DO \$\$
              BEGIN
                IF to_regclass('\''public.products'\'') IS NULL THEN
                  RAISE EXCEPTION '\''public.products was not restored'\'';
                END IF;
              END
              \$\$;
              SELECT '\''products'\'' AS table_name, COUNT(*) FROM public.products
              UNION ALL SELECT '\''variants'\'', COUNT(*) FROM public.variants
              UNION ALL SELECT '\''orders'\'', COUNT(*) FROM public.orders
              UNION ALL SELECT '\''order_items'\'', COUNT(*) FROM public.order_items
              UNION ALL SELECT '\''inventory'\'', COUNT(*) FROM public.inventory
              UNION ALL SELECT '\''wholesale_clients'\'', COUNT(*) FROM public.wholesale_clients;
            "'
