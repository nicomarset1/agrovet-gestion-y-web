name: Daily database backup

on:
  schedule:
    # 00:15 America/Buenos_Aires
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    name: Backup Neon Postgres to Google Drive
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      GDRIVE_RCLONE_CONFIG: ${{ secrets.GDRIVE_RCLONE_CONFIG }}
      GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
      # Opcional: si se define, el dump se cifra con AES-256 antes de subirlo.
      BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$DATABASE_URL" || (echo "DATABASE_URL secret is missing" && exit 1)
          if [ -z "$GDRIVE_RCLONE_CONFIG" ]; then
            test -n "$GDRIVE_FOLDER_ID" || (echo "GDRIVE_FOLDER_ID secret is missing" && exit 1)
            test -n "$GDRIVE_SERVICE_ACCOUNT_JSON" || (echo "GDRIVE_SERVICE_ACCOUNT_JSON secret is missing" && exit 1)
          fi

      - name: Install backup tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure Google Drive access
        shell: bash
        run: |
          mkdir -p "$HOME/.config/rclone"
          if [ -n "$GDRIVE_RCLONE_CONFIG" ]; then
            printf '%s' "$GDRIVE_RCLONE_CONFIG" > "$HOME/.config/rclone/rclone.conf"
            if [ -n "$GDRIVE_FOLDER_ID" ]; then
              if grep -q '^root_folder_id[[:space:]]*=' "$HOME/.config/rclone/rclone.conf"; then
                sed -i "s|^root_folder_id[[:space:]]*=.*|root_folder_id = $GDRIVE_FOLDER_ID|" "$HOME/.config/rclone/rclone.conf"
              else
                printf '\nroot_folder_id = %s\n' "$GDRIVE_FOLDER_ID" >> "$HOME/.config/rclone/rclone.conf"
              fi
            fi
            chmod 600 "$HOME/.config/rclone/rclone.conf"
          else
            printf '%s' "$GDRIVE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/gdrive-service-account.json"
            {
              echo "[gdrive]"
              echo "type = drive"
              echo "scope = drive"
              echo "service_account_file = $RUNNER_TEMP/gdrive-service-account.json"
              echo "root_folder_id = $GDRIVE_FOLDER_ID"
            } > "$HOME/.config/rclone/rclone.conf"
            chmod 600 "$RUNNER_TEMP/gdrive-service-account.json" "$HOME/.config/rclone/rclone.conf"
          fi

      - name: Create Postgres backup
        shell: bash
        run: |
          BACKUP_DATE="$(TZ=America/Buenos_Aires date +%Y-%m-%d_%H-%M)"
          BACKUP_FILE="agrovet-postgres-${BACKUP_DATE}.dump"
          BACKUP_PATH="$RUNNER_TEMP/$BACKUP_FILE"
          docker run --rm \
            -e DATABASE_URL \
            -e BACKUP_FILE="$BACKUP_FILE" \
            -v "$RUNNER_TEMP:/backup" \
            postgres:17-alpine \
            sh -c 'pg_dump --format=custom --no-owner --no-acl --file="/backup/$BACKUP_FILE" "$DATABASE_URL"'
          if [ -n "$BACKUP_ENCRYPTION_PASSPHRASE" ]; then
            echo "Cifrando backup con AES-256..."
            openssl enc -aes-256-cbc -pbkdf2 -salt \
              -in "$BACKUP_PATH" \
              -out "$BACKUP_PATH.enc" \
              -pass env:BACKUP_ENCRYPTION_PASSPHRASE
            rm -f "$BACKUP_PATH"
            BACKUP_FILE="$BACKUP_FILE.enc"
            BACKUP_PATH="$BACKUP_PATH.enc"
          else
            echo "::warning::BACKUP_ENCRYPTION_PASSPHRASE no definido: el backup se sube sin cifrar."
          fi
          sha256sum "$BACKUP_PATH" > "$BACKUP_PATH.sha256"
          echo "BACKUP_FILE=$BACKUP_FILE" >> "$GITHUB_ENV"
          echo "BACKUP_PATH=$BACKUP_PATH" >> "$GITHUB_ENV"

      - name: Upload backup to Google Drive
        shell: bash
        run: |
          rclone copyto "$BACKUP_PATH" "gdrive:$BACKUP_FILE"
          rclone copyto "$BACKUP_PATH.sha256" "gdrive:$BACKUP_FILE.sha256"

      - name: Remove old Drive backups
        shell: bash
        run: |
          rclone delete "gdrive:" --include "agrovet-postgres-*.dump*" --min-age 45d
